name: AGENTS.md Line Count Check

on:
  pull_request:
    paths: ['AGENTS.md']
  push:
    branches: [main]
    paths: ['AGENTS.md']

jobs:
  check-line-count:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify AGENTS.md is under 60 lines
        run: |
          LINES=$(wc -l < AGENTS.md)
          echo "AGENTS.md has $LINES lines (limit: 60)"
          if [ "$LINES" -gt 60 ]; then
            echo "::error::AGENTS.md exceeds 60-line limit ($LINES lines). Trim the file or move content to docs/."
            exit 1
          fi
          echo "Line count check passed."
